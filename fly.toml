# Fly.io app config. `fly launch` will rewrite this on first run if needed —
# the app name below is a placeholder; pick a unique one when prompted.
# Region "ams" (Amsterdam) is roughly central for Israel + EU users; change to
# "fra" (Frankfurt), "lhr" (London), or "iad" (US east) to taste.

app = "cv-mirror-ai"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV       = "production"
  PORT           = "4000"
  HOST           = "0.0.0.0"
  DATA_DIR       = "/data"
  UPLOAD_DIR     = "/tmp/cv-uploads"

# Persistent volume — SQLite (cv-mirror.db, sessions.db) lives here so deploys
# don't wipe user data. 1GB is free on the hobby plan; bump if your user base
# saves many CVs and analysis results.
[[mounts]]
  source      = "cvmirror_data"
  destination = "/data"

# HTTP service — Fly terminates TLS at its edge proxy and forwards plaintext
# to our app on PORT. `force_https = true` redirects http://… → https://….
[http_service]
  internal_port       = 4000
  force_https         = true
  auto_stop_machines  = "stop"     # scale-to-zero when idle to save money
  auto_start_machines = true       # wake up on incoming request
  min_machines_running = 0

# VM size — Chromium needs ~256MB just to boot, so don't go below 512MB.
# 1GB is comfortable; bump to 2GB if PDF exports start failing under memory pressure.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

# Health check — `/api/health` returns 200 without requiring auth.
[[http_service.checks]]
  type     = "http"
  interval = "30s"
  timeout  = "5s"
  grace_period = "20s"
  path     = "/api/health"
