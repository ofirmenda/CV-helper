# fly.toml app configuration file generated for cvmirror on 2026-05-18T18:51:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cvmirror'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '4000'
  UPLOAD_DIR = '/tmp/cv-uploads'

[[mounts]]
  source = 'cvmirror_data'
  destination = '/data'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
